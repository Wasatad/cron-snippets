<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бесплатный аудит</title>
  </head>
  <body>
    <div class="placeholder-wrapper">
      <div class="placeholder-inner">Прокрутите страницу вниз</div>
    </div>
    <div class="banner-wrapper">
      <div class="banner-container">
        <div class="banner-text">
          <div class="banner-title">Бесплатный аудит перехода с 1С:УПП</div>
          <div class="banner-descr">
            Проведем предварительный анализ текущей системы, определим возможные
            сценарии&nbsp;перехода и подготовим рекомендации по внедрению.
          </div>
        </div>
        <button class="banner-btn">Заказать аудит</button>
      </div>
      <!-- <div class="illustration-wrapper">
      
      </div> -->
      <img class="banner-illustration" src="src/laptop-podium.png" alt="" />
    </div>

    <div class="placeholder-wrapper">
      <div class="placeholder-inner"></div>
    </div>
  </body>
  <script>
    const illustration = document.querySelector(".banner-illustration");
    const banner = document.querySelector(".banner-wrapper");

    window.addEventListener("scroll", () => {
      const rect = banner.getBoundingClientRect();

      // скорость parallax
      const speed = 0.25;

      // смещение относительно viewport
      const offset = rect.top * speed;

      illustration.style.transform = `translateY(${offset}px)`;
    });
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
      color: #fff;
    }

    body {
      -webkit-font-smoothing: antialiased;
    }

    .placeholder-wrapper {
      width: 100%;
      height: 1000px;
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .placeholder-wrapper .placeholder-inner {
      background-color: #e7edf5;
      width: 100%;
      height: 100%;
      border-radius: 32px;

      color: #88919e;
      font-size: 32px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .banner-wrapper {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 112px 0;
      background: linear-gradient(320deg, #08216b 14.82%, #1a3da4 81.1%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .banner-illustration {
      position: absolute;
      right: 300px;
      top: 0px;
      height: auto;
      width: 600px;
    }

    .banner-container {
      padding: 0 32px;
      max-width: 1360px;
      width: 100%;
    }

    .banner-wrapper .banner-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 32px;
    }

    .banner-wrapper .banner-container .banner-text {
      max-width: 800px;
    }

    .banner-wrapper .banner-container .banner-title {
      font-size: 30px;
      font-style: normal;
      font-weight: 600;
      line-height: 120%;
      margin-bottom: 12px;
    }

    .banner-wrapper .banner-container .banner-descr {
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
    }

    .banner-wrapper .banner-container .banner-btn {
      font-size: 16px;
      font-style: normal;
      font-weight: 600;
      line-height: 150%;
      padding: 12px 20px;
      justify-content: center;
      align-items: center;
      border-radius: 64px;
      background-color: #fff;
      color: #252b37;
      outline: none;
      border: none;
    }
  </style>
</html>
