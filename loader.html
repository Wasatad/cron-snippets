<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Анимация загрузки</title>
  </head>
  <body>
    <div class="wrapper">
      <div class="loader"></div>
      <div class="loader-label">Рассчитываем стоимость...</div>
    </div>
  </body>
</html>

<style>
  :root {
    --blue: #4c9afd;
    --blue-dark: #3386ea;
    --text: #717680;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Inter, sans-serif;
    color: var(--text);
    background: #fff;
    -webkit-font-smoothing: antialiased;
  }

  .wrapper {
    width: 100%;
    height: 500px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    /* gap: 16px; */
  }

  .loader-label {
    font-size: 16px;
    margin-top: 16px;
  }

  .loader {
    width: 80px;
    aspect-ratio: 0.5;
    display: grid;
  }
  .loader:before {
    content: "";
    width: 30%;
    aspect-ratio: 1;
    border-radius: 50%;
    margin: auto auto 0;
    background: var(--blue);
    animation: l9-0 0.5s cubic-bezier(0, 800, 1, 800) infinite;
  }
  .loader:after {
    content: "";
    width: 100%;
    aspect-ratio: 1 / cos(30deg);
    margin: 0 auto auto;
    clip-path: polygon(50% -50%, 100% 50%, 50% 150%, 0 50%);
    background: #bbd7f6;
    animation: l9-1 0.5s linear infinite;
  }
  @keyframes l9-0 {
    0%,
    2% {
      translate: 0 0%;
    }
    98%,
    to {
      translate: 0 -0.2%;
    }
  }
  @keyframes l9-1 {
    0%,
    5% {
      rotate: 0deg;
    }
    95%,
    to {
      rotate: -60deg;
    }
  }
</style>
