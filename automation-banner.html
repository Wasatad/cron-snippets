<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Бесплатный аудит</title>
  </head>
  <body>
    <div class="banner-wrapper">
      <div class="banner-container">
        <div class="banner-text">
          <div class="banner-title">
            Планируете автоматизацию или&nbsp;развитие системы&nbsp;1С?
          </div>
          <div class="banner-descr">
            Помогаем сократить ручной труд, повысить прозрачность процессов
            и&nbsp;ускорить работу&nbsp;бизнеса.
          </div>
        </div>
        <button class="banner-btn">Получить консультацию</button>
        <img class="banner-illustration" src="src/1c-tiles.svg" alt="" />
      </div>
      <!-- <div class="illustration-wrapper">
      
      </div> -->
    </div>
  </body>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
      color: #fff;
    }

    body {
      -webkit-font-smoothing: antialiased;
    }

    .banner-wrapper {
      position: relative;
      overflow: hidden;
      width: 100%;
      padding: 80px 0;
      background: linear-gradient(320deg, #08216b 14.82%, #1a3da4 81.1%);
      display: flex;
      justify-content: center;
      align-items: center;

      /* flex-direction: column;
      align-items: flex-start; */
    }

    .banner-illustration {
      position: absolute;
      right: 200px;
      top: -150px;
      height: auto;
      width: 350px;
      /* 
      margin-top: -100px;
      z-index: -0; */
    }

    .banner-container {
      padding: 0 32px;
      max-width: 1360px;
      width: 100%;
      position: relative;
    }

    .banner-wrapper .banner-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 32px;
    }

    .banner-wrapper .banner-container .banner-text {
      max-width: 600px;
    }

    .banner-wrapper .banner-container .banner-title {
      font-size: 36px;
      font-style: normal;
      font-weight: 600;
      line-height: 120%;
      margin-bottom: 12px;
    }

    .banner-wrapper .banner-container .banner-descr {
      font-size: 18px;
      font-style: normal;
      font-weight: 400;
      line-height: 140%;
    }

    .banner-wrapper .banner-container .banner-btn {
      font-size: 16px;
      font-style: normal;
      font-weight: 600;
      line-height: 150%;
      padding: 12px 20px;
      justify-content: center;
      align-items: center;
      border-radius: 64px;
      background-color: #fff;
      color: #252b37;
      outline: none;
      border: none;
    }
  </style>
</html>
